<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Rate Limit Complaints Tracker</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      color: #444;
    }
    .box {
      background: white;
      border-radius: 14px;
      padding: 3rem 2.5rem;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      max-width: 480px;
    }
    h1 { font-size: 1.5rem; margin-bottom: 1rem; color: #1a1a2e; }
    p  { font-size: 0.95rem; color: #666; line-height: 1.6; }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #eee;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <h1>AI Rate Limit Complaints Tracker</h1>
    <div class="spinner"></div>
    <p>
      Data is being collected for the first time.<br>
      Please trigger the GitHub Actions workflow manually, then refresh this page after it completes.
    </p>
    <p style="margin-top:1rem; font-size:0.82rem; color:#aaa;">
      Go to: <strong>Actions → Update Rate Limit Complaints → Run workflow</strong>
    </p>
  </div>
</body>
</html>
