name: Update Rate Limit Complaints

on:
  # Run every day at 06:00 UTC
  schedule:
    - cron: "0 6 * * *"
  # Allow manual trigger from the Actions tab (useful for the first run)
  workflow_dispatch:

# Write permission is required so the bot can commit updated data back to the repo
permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Cache pip packages to speed up subsequent runs
      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 1: collect Reddit posts and classify them
      - name: Collect Reddit data
        run: python scripts/collect.py

      # Step 2: generate graphs and update GitHub Pages HTML
      - name: Generate graphs and HTML
        run: python scripts/generate_graph.py

      # Step 3: commit and push if anything changed
      - name: Commit and push changes
        run: |
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add data/complaints.json docs/
          # Only commit when there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update complaints data $(date -u +%Y-%m-%d)"
            git push
          fi
